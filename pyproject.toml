[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Streamlit multipage apps exigem sys.path antes dos imports locais (padrão intencional)
"dashboard/Inicio.py"    = ["E402"]
"dashboard/Teste.py"     = ["E402", "F401", "F541"]
"dashboard/pages/*.py"   = ["E402"]
# Algoritmos de calendário (Butcher) usam notação matemática padrão
"data/external/gerar_feriados.py" = ["E741"]
"src/utils_calendario.py"        = ["E741"]
